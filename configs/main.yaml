defaults:
  - base
  - base_mapping
  # - replica
  - fungraph3d
  # - scenefun3d
  - classes
  - logging_level
  - _self_
  # - sam

stride: 10
detections_exp_suffix: s_detections_stride${stride} # helpful label to identify your detections
force_detection: !!bool True
save_detections: !!bool True

make_edges: !!bool True

exp_suffix: r_mapping_stride${stride} # helpful label to identify your mapping experiment

save_video: !!bool True
save_objects_all_frames: !!bool False

debug_render: !!bool False
vis_render: !!bool False

denoise_interval: 10           # default 5 # Run DBSCAN every k frame. This operation is heavy
filter_interval: -1            # default 5 # Filter objects that have too few associations or are too small
merge_interval: -1             # default 5 # Merge objects based on geometric and semantic similarity
run_denoise_final_frame: !!bool True
run_filter_final_frame: !!bool True
run_merge_final_frame: !!bool True

downsample_voxel_size: 0.005    # default 0.01
obj_pcd_max_points: 5000

dbscan_remove_noise: !!bool True
dbscan_eps: 0.02          # default 0.1
dbscan_min_points: 10     # default 10  

# Selection criteria of the fused object point cloud
obj_min_points: 50      # default 50
obj_min_detections: 2 # default 2 

# For merge_overlap_objects() function
use_rerun: !!bool False
save_rerun: !!bool False

# hydra:
#   verbose: true
  # mode: MULTIRUN
  # sweeper:
  #   params:
  #     downsample_voxel_size: 0.025, 0.01, 0.001, 0.001
  #     obj_pcd_max_points: 5000, 10000, 100000, 100000

detector_mode: "ram_gdino_sam"   # "yolo" | "ram_gdino_sam"
gdino_cfg_path: "${repo_root}/src/thirdparty/groundedsam/GroundingDINO/groundingdino/config/GroundingDINO_SwinT_OGC.py"
gdino_ckpt_path: "${repo_root}/checkpoints/groundingdino_swint_ogc.pth"
sam_encoder: "vit_h"
sam_ckpt_path: "${repo_root}/checkpoints/sam_vit_h_4b8939.pth"
ram_ckpt_path: "${repo_root}/checkpoints/ram_swin_large_14m.pth"
box_thresh: 0.20
text_thresh: 0.20
iou_thresh: 0.50
NMS_on: False

out_dir: ""      # ""이면 기본 경로 규칙 사용, 아니면 이 경로로 강제 저장
max_frames: 0    # 0은 무제한, >0이면 해당 개수만 처리

object_part_knowledge: "${repo_root}/object_part_knowledge.json"
classes_output_filename: "merged_classes.txt"